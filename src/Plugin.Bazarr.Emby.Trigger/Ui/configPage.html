<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Bazarr Emby Trigger</title>
</head>
<body>
    <div id="BazarrEmbyTriggerPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <form id="BazarrEmbyTriggerForm">
                    <div class="inputContainer">
                        <label class="inputLabel" for="BazarrHost">Bazarr host</label>
                        <input id="BazarrHost" name="BazarrHost" type="text" required />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="BazarrPort">Bazarr port</label>
                        <input id="BazarrPort" name="BazarrPort" type="number" min="1" max="65535" required />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="BazarrBaseUrl">Reverse proxy / base URI</label>
                        <input id="BazarrBaseUrl" name="BazarrBaseUrl" type="text" placeholder="/bazarr" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="BazarrApiKey">Bazarr API key</label>
                        <input id="BazarrApiKey" name="BazarrApiKey" type="password" autocomplete="off" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="SearchesPerHour">Searches per hour</label>
                        <input id="SearchesPerHour" name="SearchesPerHour" type="number" min="1" required />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="MetadataCacheTtlMinutes">Bazarr metadata cache TTL (minutes)</label>
                        <input id="MetadataCacheTtlMinutes" name="MetadataCacheTtlMinutes" type="number" min="1" required />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="QueuePollIntervalSeconds">Queue poll interval (seconds)</label>
                        <input id="QueuePollIntervalSeconds" name="QueuePollIntervalSeconds" type="number" min="5" required />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="SearchTimeoutMinutes">Subtitle detection timeout (minutes)</label>
                        <input id="SearchTimeoutMinutes" name="SearchTimeoutMinutes" type="number" min="1" required />
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input id="VerboseLogging" name="VerboseLogging" type="checkbox" />
                            <span>Verbose plugin logging</span>
                        </label>
                        <div class="fieldDescription">Logs matching choices, queue state, HTTP request intent, and subtitle snapshot comparisons while still omitting API keys.</div>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="CustomRequestHeaders">Additional request headers (one per line, Header: Value)</label>
                        <textarea id="CustomRequestHeaders" name="CustomRequestHeaders" rows="4"></textarea>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel">Resolved Bazarr endpoint</label>
                        <div id="EndpointSummary" class="fieldDescription"></div>
                    </div>
                    <div id="ValidationMessage" class="fieldDescription" style="color:#d9534f"></div>
                    <div id="ConnectionMessage" class="fieldDescription"></div>
                    <div>
                        <button is="emby-button" class="raised button-submit block" id="TestConnectionButton" type="button">Test Connection</button>
                        <button is="emby-button" class="raised button-submit block" type="submit">Save</button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            (function () {
                var pluginId = '108c48a7-f1dc-4b2c-831b-a5eee53e997d';
                var page = document.querySelector('#BazarrEmbyTriggerPage');

                function normalizeBaseUrl(baseUrl) {
                    if (!baseUrl) {
                        return '';
                    }
                    return ('/' + baseUrl).replace(/\/+/g, '/').replace(/\/$/, '');
                }

                function endpointSummary() {
                    var host = document.querySelector('#BazarrHost').value.trim();
                    var port = document.querySelector('#BazarrPort').value.trim();
                    var baseUrl = normalizeBaseUrl(document.querySelector('#BazarrBaseUrl').value.trim());
                    return 'http://' + host + ':' + port + baseUrl + '/api';
                }

                function validate() {
                    var host = document.querySelector('#BazarrHost').value.trim();
                    var port = Number(document.querySelector('#BazarrPort').value.trim());
                    var message = '';

                    if (!host) {
                        message = 'Bazarr host is required.';
                    } else if (!Number.isInteger(port) || port < 1 || port > 65535) {
                        message = 'Bazarr port must be between 1 and 65535.';
                    }

                    document.querySelector('#EndpointSummary').textContent = endpointSummary();
                    document.querySelector('#ValidationMessage').textContent = message;
                    return !message;
                }

                function bindConfiguration(config) {
                    Object.keys(config).forEach(function (key) {
                        var field = document.querySelector('#' + key);
                        if (!field) {
                            return;
                        }
                        if (field.type === 'checkbox') {
                            field.checked = !!config[key];
                        } else {
                            field.value = config[key] == null ? '' : config[key];
                        }
                    });
                    validate();
                }

                function readConfiguration() {
                    return {
                        BazarrHost: document.querySelector('#BazarrHost').value.trim(),
                        BazarrPort: Number(document.querySelector('#BazarrPort').value.trim()),
                        BazarrBaseUrl: document.querySelector('#BazarrBaseUrl').value.trim(),
                        BazarrApiKey: document.querySelector('#BazarrApiKey').value,
                        SearchesPerHour: Number(document.querySelector('#SearchesPerHour').value.trim()),
                        MetadataCacheTtlMinutes: Number(document.querySelector('#MetadataCacheTtlMinutes').value.trim()),
                        QueuePollIntervalSeconds: Number(document.querySelector('#QueuePollIntervalSeconds').value.trim()),
                        SearchTimeoutMinutes: Number(document.querySelector('#SearchTimeoutMinutes').value.trim()),
                        VerboseLogging: document.querySelector('#VerboseLogging').checked,
                        CustomRequestHeaders: document.querySelector('#CustomRequestHeaders').value
                    };
                }

                page.addEventListener('viewshow', function () {
                    ApiClient.getPluginConfiguration(pluginId).then(bindConfiguration);
                });

                page.querySelectorAll('input, textarea').forEach(function (field) {
                    field.addEventListener('input', validate);
                });

                document.querySelector('#TestConnectionButton').addEventListener('click', function () {
                    if (!validate()) {
                        return;
                    }
                    document.querySelector('#ConnectionMessage').textContent = 'Testing Bazarr connection...';
                    ApiClient.ajax({
                        type: 'POST',
                        url: ApiClient.getUrl('Plugins/BazarrEmbyTrigger/TestConnection'),
                        contentType: 'application/json',
                        data: JSON.stringify(readConfiguration())
                    }).then(function (result) {
                        document.querySelector('#ConnectionMessage').textContent = result.message + ' Endpoint: ' + result.endpoint;
                    }).catch(function (error) {
                        document.querySelector('#ConnectionMessage').textContent = (error && error.message) || 'Unable to reach Bazarr.';
                    });
                });

                document.querySelector('#BazarrEmbyTriggerForm').addEventListener('submit', function (event) {
                    event.preventDefault();
                    if (!validate()) {
                        return;
                    }
                    var config = readConfiguration();
                    ApiClient.updatePluginConfiguration(pluginId, config).then(function () {
                        Dashboard.processPluginConfigurationUpdateResult();
                    });
                });
            })();
        </script>
    </div>
</body>
</html>
